<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Prompt to saved image flow</title>
  <desc id="desc">A simple three step diagram showing a prompt entering GPT Image 2 MCP and producing saved image files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#eef7f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#122025" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#14aeb5"/>
    </marker>
  </defs>
  <rect width="1200" height="430" rx="26" fill="url(#bg)"/>
  <text x="60" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#17242a">How GPT Image 2 MCP feels to use</text>
  <text x="60" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4a5a61">Send a normal prompt from your MCP client. The server chooses a mode and returns saved image files.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="270" height="150" rx="18" fill="#ffffff" stroke="#d8e5e8"/>
    <rect x="465" y="135" width="270" height="180" rx="22" fill="#102127" stroke="#37d3dc" stroke-width="3"/>
    <rect x="860" y="150" width="270" height="150" rx="18" fill="#ffffff" stroke="#d8e5e8"/>
  </g>

  <text x="105" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#14aeb5">STEP 1</text>
  <text x="105" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#17242a">Ask for an image</text>
  <text x="105" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#59666b">"Make a cinematic product shot"</text>
  <rect x="105" y="270" width="190" height="12" rx="6" fill="#dfe9eb"/>

  <text x="504" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#7de8ee">STEP 2</text>
  <text x="504" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">GPT Image 2 MCP</text>
  <text x="504" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#b6d8dc">Runs the image tool for your client</text>
  <rect x="504" y="270" width="92" height="28" rx="14" fill="#163a40" stroke="#37d3dc"/>
  <text x="521" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#c9fbff">API</text>
  <rect x="610" y="270" width="88" height="28" rx="14" fill="#3b2424" stroke="#ff8b78"/>
  <text x="627" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffd8d0">WEB</text>

  <text x="895" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#14aeb5">STEP 3</text>
  <text x="895" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#17242a">Get saved files</text>
  <text x="895" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#59666b">image-01.png + metadata.json</text>
  <g transform="translate(895 272)">
    <rect x="0" y="0" width="54" height="42" rx="7" fill="#e8f3f4" stroke="#9fd6db"/>
    <circle cx="41" cy="12" r="6" fill="#ff7d69"/>
    <path d="M8 34 L23 20 L35 31 L44 24 L50 34 Z" fill="#17b8bf"/>
    <rect x="68" y="0" width="54" height="42" rx="7" fill="#e8f3f4" stroke="#9fd6db"/>
    <circle cx="109" cy="12" r="6" fill="#ff7d69"/>
    <path d="M76 34 L91 18 L103 30 L113 22 L118 34 Z" fill="#17b8bf"/>
  </g>

  <path d="M350 225 C390 225 415 225 450 225" fill="none" stroke="#14aeb5" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M745 225 C785 225 820 225 850 225" fill="none" stroke="#14aeb5" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="70" y="350" width="335" height="42" rx="21" fill="#ffffff" stroke="#d8e5e8"/>
  <text x="96" y="377" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#31434a">No ChatGPT API key needed in chatgpt-web mode</text>
  <rect x="435" y="350" width="300" height="42" rx="21" fill="#ffffff" stroke="#d8e5e8"/>
  <text x="463" y="377" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#31434a">OpenAI API mode is available too</text>
  <rect x="765" y="350" width="365" height="42" rx="21" fill="#ffffff" stroke="#d8e5e8"/>
  <text x="793" y="377" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#31434a">Every result includes the exact file path</text>
</svg>
